# Mnemosyne MCP — remote deployment on Trevor
#
# Built from this fork's pinned source (see Dockerfile), not the floating
# ghcr.io/axdsan/mnemosyne-mcp:latest image.
#
# SSE port is bound to 127.0.0.1 only: the existing tunnel daemon on Trevor
# is expected to be the thing that actually terminates the connection from
# claude.ai / Claude Desktop / Claude Code and proxies to localhost:8080.
# Do not publish this on 0.0.0.0 — MNEMOSYNE_MCP_TOKEN is a single static
# bearer token and shouldn't be the only thing standing between the
# internet and this data.
#
# Usage:
#   cp .env.example .env    # then fill in MNEMOSYNE_MCP_TOKEN
#   docker compose -f docker-compose.trevor.yml up -d --build

services:
  mnemosyne-mcp:
    build: .
    image: mnemosyne-mcp:v3.14.0-hardened
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - mnemosyne-data:/data
    environment:
      - MNEMOSYNE_DATA_DIR=/data
      - MNEMOSYNE_MCP_TOKEN=${MNEMOSYNE_MCP_TOKEN:?set MNEMOSYNE_MCP_TOKEN in .env}
    command: ["--transport", "sse", "--host", "0.0.0.0", "--port", "8080"]

volumes:
  mnemosyne-data:
